<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f6f8; padding: 20px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">Button labels</div>
  <div class="row">
    <span style="font-size:12px;font-weight:600;color:#fff;background:#00B4B4;padding:7px 14px;border-radius:6px">Demander l'accès</span>
    <span style="font-size:12px;font-weight:600;color:#fff;background:#00B4B4;padding:7px 14px;border-radius:6px">Continuer →</span>
    <span style="font-size:12px;font-weight:600;color:#fff;background:#00B4B4;padding:5px 12px;border-radius:6px;font-size:11px">S'inscrire</span>
  </div>
  <div class="label">Navigation labels</div>
  <div class="row">
    <span style="font-size:13px;font-weight:600;color:#00B4B4">Tableau de bord</span>
    <span style="font-size:13px;font-weight:500;color:#111827">Annuaire</span>
    <span style="font-size:13px;font-weight:500;color:#111827">Agenda</span>
    <span style="font-size:13px;font-weight:500;color:#111827">Mon profil</span>
  </div>
  <div class="label">Meta / inline labels</div>
  <div class="row">
    <span style="font-size:11px;font-weight:600;color:#00B4B4;cursor:pointer">Voir tout →</span>
    <span style="font-size:11px;font-weight:600;color:#00B4B4;cursor:pointer">Annuaire →</span>
    <span style="font-size:12px;color:#6b7280">Déjà membre ? <span style="color:#00B4B4;cursor:pointer">Se connecter</span></span>
    <span style="font-size:11px;color:#6b7280">Communauté privée · 40+ professionnels</span>
  </div>
  <div class="label">Form labels</div>
  <div class="row">
    <span style="font-size:12px;font-weight:500;color:#374151">Prénom *</span>
    <span style="font-size:12px;font-weight:500;color:#374151">Type de membre *</span>
    <span style="font-size:12px;font-weight:500;color:#374151">Expertises * <span style="color:#6b7280;font-weight:400">(multi-sélection)</span></span>
  </div>
</body>
</html>
