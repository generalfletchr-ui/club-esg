<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body>
  <div style="background:linear-gradient(135deg,#0a2a4a 0%,#1a4a6a 60%,#0a3a3a 100%);padding:40px;text-align:center;min-width:700px">
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,180,180,0.15);border:1px solid rgba(0,180,180,0.3);border-radius:20px;padding:4px 14px;margin-bottom:16px">
      <span style="width:6px;height:6px;border-radius:3px;background:#00B4B4;display:inline-block"></span>
      <span style="color:#00B4B4;font-size:12px;font-weight:600">Communauté privée · 40+ professionnels</span>
    </div>
    <h1 style="font-family:'DM Sans',sans-serif;font-size:32px;font-weight:700;color:#fff;line-height:1.25;max-width:500px;margin:0 auto 12px">
      La communauté des <span style="color:#00B4B4">professionnels ESG</span> engagés
    </h1>
    <p style="font-size:14px;color:rgba(255,255,255,0.65);max-width:400px;margin:0 auto 24px;line-height:1.6">
      Échangez, formez-vous et développez votre réseau.
    </p>
    <div style="display:flex;gap:10px;justify-content:center">
      <span style="background:#00B4B4;color:#fff;font-size:12px;font-weight:600;padding:8px 20px;border-radius:6px;cursor:pointer">Demander l'accès</span>
      <span style="background:transparent;color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;padding:8px 20px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.25)">Découvrir le club</span>
    </div>
    <div style="display:flex;justify-content:center;gap:36px;margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)">
      <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#00B4B4">40+</div><div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px">Membres</div></div>
      <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#00B4B4">12</div><div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px">Webinaires</div></div>
      <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#00B4B4">8</div><div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px">Replays</div></div>
      <div style="text-align:center"><div style="font-size:20px;font-weight:700;color:#00B4B4">3</div><div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px">Events / mois</div></div>
    </div>
  </div>
</body>
</html>
