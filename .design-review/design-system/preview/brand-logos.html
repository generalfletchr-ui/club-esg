<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f6f8; padding: 24px; }
.row { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
.logo-box { padding: 14px 18px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.option-label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
</style>
</head>
<body>
  <div style="display:flex;flex-direction:column;gap:20px">
    <!-- Option A -->
    <div>
      <div class="option-label">Option A — Feuille + Wordmark</div>
      <div class="row">
        <div class="logo-box" style="background:#fff;border:1px solid #e5e7eb">
          <img src="../assets/logos/logo-a.svg" alt="Logo A light" height="44">
        </div>
        <div class="logo-box" style="background:#0f1c2e">
          <img src="../assets/logos/logo-a.svg" alt="Logo A dark" height="44">
        </div>
      </div>
    </div>
    <!-- Option B -->
    <div>
      <div class="option-label">Option B — Badge CE + Club ESG</div>
      <div class="row">
        <div class="logo-box" style="background:#fff;border:1px solid #e5e7eb">
          <img src="../assets/logos/logo-b.svg" alt="Logo B light" height="44">
        </div>
        <div class="logo-box" style="background:#0f1c2e">
          <img src="../assets/logos/logo-b.svg" alt="Logo B dark" height="44">
        </div>
      </div>
    </div>
    <!-- Option C -->
    <div>
      <div class="option-label">Option C — Réseau communautaire ⭐ recommended</div>
      <div class="row">
        <div class="logo-box" style="background:#fff;border:1px solid #e5e7eb">
          <img src="../assets/logos/logo-c.svg" alt="Logo C light" height="56">
        </div>
        <div class="logo-box" style="background:#0f1c2e">
          <img src="../assets/logos/logo-c.svg" alt="Logo C dark" height="56">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
