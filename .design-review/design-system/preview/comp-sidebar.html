<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f6f8; padding: 0; }
</style>
</head>
<body>
  <div style="width:220px;background:#ebebe6;border-right:1px solid #e5e7eb;min-height:420px;display:flex;flex-direction:column">
    <!-- Logo -->
    <div style="padding:14px 16px 12px;border-bottom:1px solid #e5e7eb">
      <svg width="130" height="36" viewBox="0 0 170 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="28" r="4" fill="#00B4B4"/>
        <circle cx="8" cy="20" r="3" fill="#00B4B4" opacity="0.7"/>
        <circle cx="32" cy="20" r="3" fill="#00B4B4" opacity="0.7"/>
        <circle cx="8" cy="36" r="3" fill="#00B4B4" opacity="0.5"/>
        <circle cx="32" cy="36" r="3" fill="#00B4B4" opacity="0.5"/>
        <line x1="20" y1="28" x2="8" y2="20" stroke="#00B4B4" stroke-width="1.2" opacity="0.6"/>
        <line x1="20" y1="28" x2="32" y2="20" stroke="#00B4B4" stroke-width="1.2" opacity="0.6"/>
        <line x1="20" y1="28" x2="8" y2="36" stroke="#00B4B4" stroke-width="1.2" opacity="0.4"/>
        <line x1="20" y1="28" x2="32" y2="36" stroke="#00B4B4" stroke-width="1.2" opacity="0.4"/>
        <text x="46" y="24" font-family="'DM Sans','Inter',sans-serif" font-size="17" font-weight="700" fill="#111827" letter-spacing="-0.4">club esg<tspan fill="#00B4B4">.</tspan></text>
        <text x="46" y="40" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="500" fill="#6b7280">by Fletchr</text>
      </svg>
    </div>
    <!-- Nav items -->
    <div style="flex:1;padding:8px">
      <!-- Active item -->
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;background:#e6f7f7;border-left:2px solid #00B4B4;cursor:pointer">
        <span style="font-size:13px;color:#00B4B4;width:16px;text-align:center">⊞</span>
        <span style="font-size:13px;color:#00B4B4;font-weight:600">Tableau de bord</span>
      </div>
      <!-- Inactive items -->
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;border-left:2px solid transparent;cursor:pointer">
        <span style="font-size:13px;color:#9ca3af;width:16px;text-align:center">◫</span>
        <span style="font-size:13px;color:#111827;font-weight:500">Annuaire</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;border-left:2px solid transparent;cursor:pointer">
        <span style="font-size:13px;color:#9ca3af;width:16px;text-align:center">◷</span>
        <span style="font-size:13px;color:#111827;font-weight:500">Agenda</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;border-left:2px solid transparent;cursor:pointer">
        <span style="font-size:13px;color:#9ca3af;width:16px;text-align:center">▶</span>
        <span style="font-size:13px;color:#111827;font-weight:500">Replays</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;border-left:2px solid transparent;cursor:pointer">
        <span style="font-size:13px;color:#9ca3af;width:16px;text-align:center">◉</span>
        <span style="font-size:13px;color:#111827;font-weight:500">Mon profil</span>
      </div>
      <!-- Admin section -->
      <div style="margin-top:14px;margin-bottom:4px;padding:0 10px">
        <span style="font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em">Admin</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;border-left:2px solid transparent;cursor:pointer">
        <span style="font-size:12px;color:#9ca3af;width:16px;text-align:center">⚙</span>
        <span style="font-size:13px;color:#111827;font-weight:500">Demandes</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;margin-bottom:1px;border-left:2px solid transparent;cursor:pointer">
        <span style="font-size:12px;color:#9ca3af;width:16px;text-align:center">≡</span>
        <span style="font-size:13px;color:#111827;font-weight:500">Membres</span>
      </div>
    </div>
    <!-- Footer -->
    <div style="border-top:1px solid #e5e7eb;padding:8px">
      <div style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;background:#f0fdf4;border:1px solid #bbf7d0;cursor:pointer;margin-bottom:4px">
        <span style="font-size:13px">💬</span>
        <span style="font-size:12px;color:#16a34a;font-weight:700">WhatsApp groupe</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:6px;cursor:pointer">
        <span style="font-size:12px;color:#9ca3af">⏻</span>
        <span style="font-size:13px;color:#111827">Déconnexion</span>
      </div>
    </div>
  </div>
</body>
</html>
