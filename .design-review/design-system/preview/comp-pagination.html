<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f6f8; padding: 20px; }
.row { display: flex; gap: 4px; align-items: center; }
.pg { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>
  <div class="row">
    <div class="pg" style="background:#fff;border:1px solid #e5e7eb;color:#374151">‹</div>
    <div class="pg" style="background:#00B4B4;border:1px solid #00B4B4;color:#fff;font-weight:700">1</div>
    <div class="pg" style="background:#fff;border:1px solid #e5e7eb;color:#374151">2</div>
    <div class="pg" style="background:#fff;border:1px solid #e5e7eb;color:#374151">3</div>
    <div class="pg" style="background:#fff;border:1px solid #e5e7eb;color:#374151">...</div>
    <div class="pg" style="background:#fff;border:1px solid #e5e7eb;color:#374151">11</div>
    <div class="pg" style="background:#fff;border:1px solid #e5e7eb;color:#374151">›</div>
  </div>
</body>
</html>
