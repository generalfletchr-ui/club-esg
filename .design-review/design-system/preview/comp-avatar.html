<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f6f8; padding: 20px; }
.label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; margin-top: 14px; }
.row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
.avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="label">Sizes</div>
  <div class="row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="avatar" style="width:72px;height:72px;font-size:26px;background:#00B4B4">SL</div>
      <span style="font-size:10px;color:#6b7280">72px · profile</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="avatar" style="width:44px;height:44px;font-size:16px;background:#1A365D">MK</div>
      <span style="font-size:10px;color:#6b7280">44px · card</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="avatar" style="width:36px;height:36px;font-size:13px;background:#7c6ea0">AB</div>
      <span style="font-size:10px;color:#6b7280">36px · list</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="avatar" style="width:30px;height:30px;font-size:11px;background:#e07040">RP</div>
      <span style="font-size:10px;color:#6b7280">30px · compact</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="avatar" style="width:24px;height:24px;font-size:9px;background:#2563eb">JD</div>
      <span style="font-size:10px;color:#6b7280">24px · tiny</span>
    </div>
  </div>
  <div class="label">Stacked avatars</div>
  <div style="display:flex">
    <div class="avatar" style="width:32px;height:32px;font-size:11px;background:#00B4B4;border:2px solid #fff;z-index:4">SL</div>
    <div class="avatar" style="width:32px;height:32px;font-size:11px;background:#1A365D;border:2px solid #fff;margin-left:-8px;z-index:3">MK</div>
    <div class="avatar" style="width:32px;height:32px;font-size:11px;background:#7c6ea0;border:2px solid #fff;margin-left:-8px;z-index:2">AB</div>
    <div class="avatar" style="width:32px;height:32px;font-size:11px;background:#e5e7eb;color:#6b7280;border:2px solid #fff;margin-left:-8px;z-index:1">+8</div>
  </div>
</body>
</html>
