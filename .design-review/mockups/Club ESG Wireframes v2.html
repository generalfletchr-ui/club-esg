<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Club ESG — Wireframes v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f0eee9; }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

// ─── Fletchr Design Tokens (extrait des screenshots) ─────────────
const T = {
  // Colors
  teal:       '#00B4B4',
  tealHover:  '#009898',
  tealLight:  '#e6f7f7',
  tealMid:    '#b2e8e8',
  white:      '#ffffff',
  bg:         '#f5f6f8',
  bgCard:     '#ffffff',
  sidebar:    '#ebebe6',
  sidebarBg:  '#ebebe6',
  border:     '#e5e7eb',
  borderMid:  '#d1d5db',
  text:       '#111827',
  textMid:    '#374151',
  textMuted:  '#6b7280',
  textLight:  '#9ca3af',
  // Status colors (from Fletchr)
  orange:     '#f97316',
  orangeLight:'#fff4ee',
  yellow:     '#eab308',
  yellowLight:'#fefce8',
  red:        '#ef4444',
  redLight:   '#fef2f2',
  green:      '#22c55e',
  greenLight: '#f0fdf4',
  // Font
  font:       "'Inter', sans-serif",
};

// ─── Shared primitives ────────────────────────────────────────────
const s = {
  card: {
    background: T.bgCard,
    border: `1px solid ${T.border}`,
    borderRadius: 8,
    padding: '16px',
  },
  label: {
    fontSize: 11,
    fontWeight: 600,
    color: T.textMuted,
    textTransform: 'uppercase',
    letterSpacing: '0.05em',
  },
  pill: (color, bg) => ({
    display: 'inline-flex', alignItems: 'center',
    padding: '2px 10px', borderRadius: 20,
    fontSize: 11, fontWeight: 600,
    color, background: bg,
  }),
  btn: {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: '7px 14px', borderRadius: 6,
    background: T.teal, color: '#fff',
    fontSize: 12, fontWeight: 600, cursor: 'pointer', border: 'none',
    whiteSpace: 'nowrap',
  },
  btnOutline: {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: '6px 14px', borderRadius: 6,
    background: '#fff', color: T.textMid,
    fontSize: 12, fontWeight: 500, cursor: 'pointer',
    border: `1px solid ${T.border}`,
    whiteSpace: 'nowrap',
  },
  input: {
    height: 34, border: `1px solid ${T.border}`,
    borderRadius: 6, background: '#fff',
    padding: '0 10px', fontSize: 12,
    color: T.textMuted, width: '100%',
    display: 'flex', alignItems: 'center',
  },
};

const Tag = ({ children, color = T.teal, bg = T.tealLight }) => (
  <span style={s.pill(color, bg)}>{children}</span>
);

const Avatar = ({ initials, size = 28, colors = ['#00B4B4','#1A365D','#7c6ea0','#e07040','#2563eb','#16a34a'] }) => {
  const idx = (initials.charCodeAt(0) + (initials.charCodeAt(1)||0)) % colors.length;
  return (
    <div style={{ width: size, height: size, borderRadius: size/2, background: colors[idx], display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      <span style={{ color: '#fff', fontSize: size * 0.38, fontWeight: 700 }}>{initials}</span>
    </div>
  );
};

// ─── LOGO OPTIONS ─────────────────────────────────────────────────
// Option A — Wordmark "club esg." style fietchr.
const LogoA = ({ size = 1 }) => (
  <svg width={160*size} height={44*size} viewBox="0 0 160 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* leaf/circle icon */}
    <circle cx="20" cy="22" r="16" fill="#00B4B4" opacity="0.12"/>
    <path d="M14 26 C14 26 16 16 26 14 C26 14 24 24 14 26Z" fill="#00B4B4"/>
    <path d="M20 28 C20 28 14 26 14 26 L16 22" stroke="#00B4B4" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
    {/* wordmark */}
    <text x="44" y="17" fontFamily="'DM Sans', 'Inter', sans-serif" fontSize="11" fontWeight="500" fill="#6b7280">by Fletchr</text>
    <text x="44" y="33" fontFamily="'DM Sans', 'Inter', sans-serif" fontSize="18" fontWeight="700" fill="#111827" letterSpacing="-0.5">club esg<tspan fill="#00B4B4">.</tspan></text>
  </svg>
);

// Option B — Badge rond + texte
const LogoB = ({ size = 1 }) => (
  <svg width={160*size} height={44*size} viewBox="0 0 160 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* badge */}
    <rect x="2" y="4" width="36" height="36" rx="10" fill="#00B4B4"/>
    {/* CE monogram */}
    <text x="20" y="27" fontFamily="'DM Sans','Inter',sans-serif" fontSize="16" fontWeight="700" fill="#fff" textAnchor="middle">CE</text>
    {/* text */}
    <text x="48" y="17" fontFamily="'DM Sans', 'Inter', sans-serif" fontSize="10" fontWeight="500" fill="#6b7280" letterSpacing="0.05em">BY FLETCHR</text>
    <text x="48" y="33" fontFamily="'DM Sans','Inter',sans-serif" fontSize="17" fontWeight="700" fill="#111827" letterSpacing="-0.3">Club ESG</text>
  </svg>
);

// Option C — Nœud réseau (communauté) + texte
const LogoC = ({ size = 1 }) => (
  <svg width={170*size} height={56*size} viewBox="0 0 170 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* réseau */}
    <circle cx="20" cy="28" r="4" fill="#00B4B4"/>
    <circle cx="8" cy="20" r="3" fill="#00B4B4" opacity="0.7"/>
    <circle cx="32" cy="20" r="3" fill="#00B4B4" opacity="0.7"/>
    <circle cx="8" cy="36" r="3" fill="#00B4B4" opacity="0.5"/>
    <circle cx="32" cy="36" r="3" fill="#00B4B4" opacity="0.5"/>
    <line x1="20" y1="28" x2="8" y2="20" stroke="#00B4B4" strokeWidth="1.2" opacity="0.6"/>
    <line x1="20" y1="28" x2="32" y2="20" stroke="#00B4B4" strokeWidth="1.2" opacity="0.6"/>
    <line x1="20" y1="28" x2="8" y2="36" stroke="#00B4B4" strokeWidth="1.2" opacity="0.4"/>
    <line x1="20" y1="28" x2="32" y2="36" stroke="#00B4B4" strokeWidth="1.2" opacity="0.4"/>
    {/* line 1: club esg. */}
    <text x="46" y="24" fontFamily="'DM Sans','Inter',sans-serif" fontSize="17" fontWeight="700" fill="#111827" letterSpacing="-0.4">club esg<tspan fill="#00B4B4">.</tspan></text>
    {/* line 2: by Fletchr */}
    <text x="46" y="40" fontFamily="'DM Sans','Inter',sans-serif" fontSize="11" fontWeight="500" fill="#6b7280" letterSpacing="0.01em">by Fletchr</text>
  </svg>
);

// ─── Sidebar ──────────────────────────────────────────────────────
const navMain = [
  { icon: '⊞', label: 'Tableau de bord', active: true },
  { icon: '◫', label: 'Annuaire' },
  { icon: '◷', label: 'Agenda' },
  { icon: '▶', label: 'Replays' },
  { icon: '◉', label: 'Mon profil' },
];
const navAdmin = [
  { icon: '⚙', label: 'Demandes' },
  { icon: '≡', label: 'Membres' },
  { icon: '✦', label: 'Événements' },
  { icon: '▤', label: 'Replays' },
];

const Sidebar = ({ activeItem = 'Tableau de bord', logo = 'C' }) => {
  const LogoComp = logo === 'B' ? LogoB : logo === 'C' ? LogoC : LogoA;
  return (
    <div style={{
      width: 220, background: T.sidebar,
      borderRight: `1px solid ${T.border}`,
      height: '100%', display: 'flex', flexDirection: 'column',
      flexShrink: 0,
    }}>
      {/* Logo */}
      <div style={{ padding: '14px 16px 12px', borderBottom: `1px solid ${T.border}` }}>
        <LogoComp size={0.82} />
      </div>

      {/* Nav */}
      <div style={{ flex: 1, padding: '8px 8px', overflowY: 'auto' }}>
        {navMain.map(item => {
          const isActive = item.label === activeItem;
          return (
            <div key={item.label} style={{
              display: 'flex', alignItems: 'center', gap: 9,
              padding: '7px 10px', borderRadius: 6, marginBottom: 1,
              cursor: 'pointer',
              background: isActive ? T.tealLight : 'transparent',
              borderLeft: isActive ? `2px solid ${T.teal}` : '2px solid transparent',
            }}>
              <span style={{ fontSize: 13, color: isActive ? T.teal : T.textMuted, width: 16, textAlign: 'center' }}>{item.icon}</span>
              <span style={{ fontSize: 13, color: isActive ? T.teal : T.text, fontWeight: isActive ? 600 : 500 }}>{item.label}</span>
            </div>
          );
        })}

        {/* Admin section */}
        <div style={{ marginTop: 14, marginBottom: 4, padding: '0 10px' }}>
          <span style={{ ...s.label, fontSize: 10 }}>Admin</span>
        </div>
        {navAdmin.map(item => (
          <div key={item.label} style={{
            display: 'flex', alignItems: 'center', gap: 9,
            padding: '7px 10px', borderRadius: 6, marginBottom: 1,
            cursor: 'pointer', borderLeft: '2px solid transparent',
          }}>
            <span style={{ fontSize: 12, color: T.textLight, width: 16, textAlign: 'center' }}>{item.icon}</span>
            <span style={{ fontSize: 13, color: T.text, fontWeight: 500 }}>{item.label}</span>
          </div>
        ))}
      </div>

      {/* Footer */}
      <div style={{ borderTop: `1px solid ${T.border}`, padding: '8px 8px' }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 9, padding: '7px 10px',
          borderRadius: 6, background: '#f0fdf4', cursor: 'pointer', marginBottom: 4,
          border: `1px solid #bbf7d0`,
        }}>
          <span style={{ fontSize: 13 }}>💬</span>
          <span style={{ fontSize: 12, color: '#16a34a', fontWeight: 700 }}>WhatsApp groupe</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '6px 10px', borderRadius: 6, cursor: 'pointer' }}>
          <span style={{ fontSize: 12, color: T.textLight }}>⏻</span>
          <span style={{ fontSize: 13, color: T.text }}>Déconnexion</span>
        </div>
      </div>
    </div>
  );
};

// ─── Top bar ──────────────────────────────────────────────────────
const TopBar = ({ page = 'Tableau de bord' }) => (
  <div style={{
    height: 48, background: T.white, borderBottom: `1px solid ${T.border}`,
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 20px', flexShrink: 0,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: T.bg, padding: '5px 14px', borderRadius: 6, border: `1px solid ${T.border}` }}>
      <span style={{ fontSize: 12, color: T.textMuted }}>⊞</span>
      <span style={{ fontSize: 13, fontWeight: 500, color: T.textMid }}>{page}</span>
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontSize: 13, color: T.textMid, fontWeight: 500 }}>Thomas Perrien</span>
      <Avatar initials="TP" size={30} />
    </div>
  </div>
);

// ─── SCREEN 1: Dashboard ──────────────────────────────────────────
const DashboardScreen = ({ logo = 'A' }) => (
  <div style={{ display: 'flex', height: 640, width: 960, fontFamily: T.font, background: T.bg, borderRadius: 8, overflow: 'hidden', boxShadow: '0 2px 16px rgba(0,0,0,0.08)' }}>
    <Sidebar activeItem="Tableau de bord" logo={logo} />
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar page="Tableau de bord" />
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px' }}>
        {/* Welcome */}
        <p style={{ fontSize: 13, color: T.teal, fontWeight: 500, marginBottom: 3 }}>Bonjour, Thomas,</p>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: T.text, marginBottom: 16 }}>Bienvenue au Club ESG !</h1>

        {/* Profile completion */}
        <div style={{ ...s.card, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 20 }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: T.textMid }}>Complétion du profil</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: T.teal }}>75%</span>
            </div>
            <div style={{ height: 5, background: T.border, borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ width: '75%', height: '100%', background: T.teal, borderRadius: 3 }} />
            </div>
            <p style={{ fontSize: 11, color: T.textMuted, marginTop: 5 }}>Ajoutez votre photo de profil et votre biographie pour compléter votre profil.</p>
          </div>
          <div style={s.btn}>Compléter mon profil →</div>
        </div>

        {/* Row: events + members */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
          {/* Events */}
          <div style={s.card}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: T.text }}>Prochains événements</span>
              <span style={{ fontSize: 11, color: T.teal, fontWeight: 600, cursor: 'pointer' }}>Voir tout →</span>
            </div>
            {[
              { type: 'Webinaire', label: 'teal', title: 'CSRD : comment se préparer ?', date: '12 mai · 12h00', icon: '🎙' },
              { type: 'Afterwork', label: 'navy', title: 'Networking ESG Paris', date: '20 mai · 18h30', icon: '🤝' },
            ].map((ev, i) => (
              <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 0', borderTop: `1px solid ${T.border}` }}>
                <div style={{ width: 34, height: 34, borderRadius: 8, background: T.tealLight, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 16 }}>
                  {ev.icon}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ marginBottom: 3 }}>
                    <Tag>{ev.type}</Tag>
                  </div>
                  <p style={{ fontSize: 12, fontWeight: 600, color: T.text }}>{ev.title}</p>
                  <p style={{ fontSize: 11, color: T.textMuted }}>{ev.date}</p>
                </div>
                <div style={{ ...s.btn, padding: '5px 10px', fontSize: 11, alignSelf: 'center' }}>S'inscrire</div>
              </div>
            ))}
          </div>

          {/* New members */}
          <div style={s.card}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: T.text }}>Nouveaux membres</span>
              <span style={{ fontSize: 11, color: T.teal, fontWeight: 600, cursor: 'pointer' }}>Annuaire →</span>
            </div>
            {[
              { i: 'SL', name: 'Sophie Laurent', role: 'Consultante RSE', company: 'BNP Paribas' },
              { i: 'MK', name: 'Marc Kowalski', role: 'Responsable RSE', company: 'Veolia' },
              { i: 'AB', name: 'Aïcha Benali', role: 'Expert-comptable', company: 'Cabinet Benali' },
            ].map((m, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderTop: `1px solid ${T.border}` }}>
                <Avatar initials={m.i} size={30} />
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 12, fontWeight: 600, color: T.text }}>{m.name}</p>
                  <p style={{ fontSize: 11, color: T.textMuted }}>{m.role} · {m.company}</p>
                </div>
                <span style={{ fontSize: 11, color: T.teal, fontWeight: 500, cursor: 'pointer' }}>Voir →</span>
              </div>
            ))}
          </div>
        </div>

        {/* WhatsApp */}
        <div style={{ borderRadius: 8, background: '#f0fdf4', border: '1px solid #bbf7d0', padding: '14px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 22 }}>💬</span>
            <div>
              <p style={{ fontSize: 13, fontWeight: 600, color: '#166534' }}>Groupe WhatsApp communautaire</p>
              <p style={{ fontSize: 11, color: '#16a34a' }}>Rejoignez les échanges rapides et informels avec les membres</p>
            </div>
          </div>
          <div style={{ ...s.btn, background: '#16a34a' }}>Rejoindre →</div>
        </div>
      </div>
    </div>
  </div>
);

// ─── SCREEN 2: Annuaire ───────────────────────────────────────────
const AnnuaireScreen = ({ logo = 'A' }) => (
  <div style={{ display: 'flex', height: 640, width: 960, fontFamily: T.font, background: T.bg, borderRadius: 8, overflow: 'hidden', boxShadow: '0 2px 16px rgba(0,0,0,0.08)' }}>
    <Sidebar activeItem="Annuaire" logo={logo} />
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <TopBar page="Annuaire des membres" />
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px' }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: T.text }}>Annuaire des membres</h2>
            <p style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>42 membres · 3 nouveaux cette semaine</p>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
          <div style={{ ...s.input, flex: 1, minWidth: 180, gap: 8, display: 'flex', alignItems: 'center' }}>
            <span style={{ color: T.textMuted, fontSize: 13 }}>🔍</span>
            <span style={{ fontSize: 12, color: T.textLight }}>Rechercher un membre...</span>
          </div>
          {['Type de membre ▾', 'Secteur ▾', 'Expertise ▾', 'Zone géo. ▾'].map(f => (
            <div key={f} style={{ ...s.btnOutline, padding: '0 12px', height: 34 }}>
              <span style={{ fontSize: 12 }}>{f}</span>
            </div>
          ))}
        </div>

        {/* Active filters */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 14, flexWrap: 'wrap' }}>
          {['Consultant RSE ×', 'Finance & Assurance ×'].map(t => (
            <span key={t} style={{ ...s.pill(T.teal, T.tealLight), cursor: 'pointer' }}>{t}</span>
          ))}
          <span style={{ fontSize: 11, color: T.textMuted, alignSelf: 'center', cursor: 'pointer' }}>Effacer les filtres</span>
        </div>

        {/* Grid 2 cols */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {[
            { i: 'SL', name: 'Sophie Laurent', fn: 'Directrice RSE', co: 'Veolia', sector: 'Énergie & Utilities', city: 'Paris', type: 'Responsable RSE', tags: ['CSRD', 'Stratégie RSE', 'Finance durable'] },
            { i: 'MK', name: 'Marc Kowalski', fn: 'Consultant senior', co: 'EY', sector: 'Finance & Assurance', city: 'Lyon', type: 'Consultant RSE', tags: ['Bilan carbone', 'Audit & Certif.'] },
            { i: 'AB', name: 'Aïcha Benali', fn: 'Expert-comptable', co: 'Cabinet Benali', sector: 'Services', city: 'Bordeaux', type: 'Expert-comptable', tags: ['Finance durable', 'Conformité'] },
            { i: 'RP', name: 'Rémi Petit', fn: 'RSE Manager', co: 'Décathlon', sector: 'Commerce', city: 'Lille', type: 'Responsable RSE', tags: ['Éco. circulaire', 'QVT & RH'] },
          ].map((m, i) => (
            <div key={i} style={{ ...s.card, display: 'flex', gap: 12, padding: '12px 14px' }}>
              <Avatar initials={m.i} size={40} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 6 }}>
                  <div>
                    <p style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{m.name}</p>
                    <p style={{ fontSize: 11, color: T.textMuted }}>{m.fn} · {m.co}</p>
                  </div>
                  <Tag>{m.type.split(' ')[0]}</Tag>
                </div>
                <p style={{ fontSize: 11, color: T.textMuted, margin: '4px 0 6px' }}>📍 {m.city} · {m.sector}</p>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 8 }}>
                  {m.tags.map(t => <Tag key={t} color={T.textMuted} bg={T.bg}>{t}</Tag>)}
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ ...s.btnOutline, display: 'inline-flex', padding: '4px 12px', fontSize: 11 }}>
                    Voir le profil →
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Pagination */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 4, marginTop: 16 }}>
          {['‹', 1, 2, 3, '...', 11, '›'].map((p, i) => (
            <div key={i} style={{
              width: 28, height: 28, borderRadius: 6,
              background: p === 1 ? T.teal : '#fff',
              border: `1px solid ${p === 1 ? T.teal : T.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer'
            }}>
              <span style={{ fontSize: 12, fontWeight: p === 1 ? 700 : 400, color: p === 1 ? '#fff' : T.textMid }}>{p}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>
);

// ─── SCREEN 3: Inscription ────────────────────────────────────────
const InscriptionScreen = ({ step = 1, logo = 'A' }) => {
  const LogoComp = logo === 'B' ? LogoB : logo === 'C' ? LogoC : LogoA;
