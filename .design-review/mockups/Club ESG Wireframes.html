<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Club ESG — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Work Sans', sans-serif; background: #f0f0eb; }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

// ─── Design tokens ───────────────────────────────────────────────
const C = {
  teal:    '#00B4B4',
  tealLight: '#e6f9f9',
  navy:    '#1A365D',
  navyLight: '#2a4a7f',
  white:   '#FFFFFF',
  bg:      '#F7F8FA',
  text:    '#2D3748',
  muted:   '#718096',
  border:  '#E2E8F0',
  sketch:  '#b0a090',
};

// ─── Sketch helpers ───────────────────────────────────────────────
const Sketchy = ({ style, children, ...props }) => (
  <div style={{ fontFamily: "'Caveat', cursive", ...style }} {...props}>{children}</div>
);

const Box = ({ w, h, label, color = C.border, bg = '#fafafa', style, radius = 6, children }) => (
  <div style={{
    width: w, height: h, border: `1.5px dashed ${color}`, borderRadius: radius,
    background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center',
    flexDirection: 'column', gap: 4, overflow: 'hidden', position: 'relative', ...style
  }}>
    {children || (label && <span style={{ fontSize: 11, color: C.muted, fontFamily: "'Caveat', cursive", textAlign: 'center', padding: '0 8px' }}>{label}</span>)}
  </div>
);

const Tag = ({ children, color = C.teal }) => (
  <span style={{
    display: 'inline-block', padding: '2px 8px', borderRadius: 20,
    background: color + '18', color, fontSize: 10, fontWeight: 600, border: `1px solid ${color}40`
  }}>{children}</span>
);

const Badge = ({ children, type = 'teal' }) => {
  const colors = { teal: [C.teal, C.tealLight], navy: [C.navy, '#e8edf5'], gray: [C.muted, '#f1f3f5'] };
  const [fg, bg] = colors[type] || colors.teal;
  return <span style={{ display: 'inline-block', padding: '2px 8px', borderRadius: 20, background: bg, color: fg, fontSize: 10, fontWeight: 600 }}>{children}</span>;
};

const Divider = ({ margin = '10px 0' }) => <div style={{ height: 1, background: C.border, margin }} />;

const Annotation = ({ text, top, left, right, bottom, arrow = 'left' }) => (
  <div style={{ position: 'absolute', top, left, right, bottom, zIndex: 10 }}>
    <Sketchy style={{ fontSize: 11, color: '#e07020', background: '#fffbe6', border: '1px solid #f0d080', borderRadius: 6, padding: '3px 8px', whiteSpace: 'nowrap' }}>
      ← {text}
    </Sketchy>
  </div>
);

// ─── Sidebar component ────────────────────────────────────────────
const navItems = [
  { icon: '⊞', label: 'Dashboard', active: true },
  { icon: '◫', label: 'Annuaire' },
  { icon: '◷', label: 'Agenda' },
  { icon: '▶', label: 'Replays' },
  { icon: '◉', label: 'Mon profil' },
];
const adminItems = [
  { icon: '⚙', label: 'Demandes' },
  { icon: '≡', label: 'Membres' },
  { icon: '✦', label: 'Événements' },
];

const Sidebar = ({ compact = false }) => (
  <div style={{
    width: compact ? 60 : 220, background: C.navy, height: '100%',
    display: 'flex', flexDirection: 'column', padding: compact ? '16px 0' : '0',
    flexShrink: 0, borderRadius: '10px 0 0 10px', overflow: 'hidden'
  }}>
    {/* Logo */}
    <div style={{ padding: compact ? '12px 0' : '18px 16px', borderBottom: '1px solid rgba(255,255,255,0.1)', display: 'flex', alignItems: 'center', justifyContent: compact ? 'center' : 'flex-start', gap: 10 }}>
      <div style={{ width: 32, height: 32, borderRadius: 8, background: C.teal, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <span style={{ color: '#fff', fontSize: 14, fontWeight: 700 }}>C</span>
      </div>
      {!compact && <span style={{ color: '#fff', fontWeight: 700, fontSize: 13 }}>Club ESG</span>}
    </div>

    {/* Nav items */}
    <div style={{ padding: compact ? '8px 0' : '8px', flex: 1 }}>
      {navItems.map(item => (
        <div key={item.label} style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: compact ? '10px 0' : '9px 10px',
          justifyContent: compact ? 'center' : 'flex-start',
          borderRadius: 8, marginBottom: 2, cursor: 'pointer',
          background: item.active ? 'rgba(0,180,180,0.15)' : 'transparent',
          borderLeft: item.active ? `3px solid ${C.teal}` : '3px solid transparent',
        }}>
          <span style={{ color: item.active ? C.teal : 'rgba(255,255,255,0.6)', fontSize: 15 }}>{item.icon}</span>
          {!compact && <span style={{ color: item.active ? '#fff' : 'rgba(255,255,255,0.6)', fontSize: 13, fontWeight: item.active ? 600 : 400 }}>{item.label}</span>}
        </div>
      ))}

      {/* Admin section */}
      {!compact && <div style={{ marginTop: 16 }}>
        <div style={{ padding: '4px 10px', fontSize: 10, color: 'rgba(255,255,255,0.35)', fontWeight: 600, letterSpacing: 1, textTransform: 'uppercase' }}>Admin</div>
        {adminItems.map(item => (
          <div key={item.label} style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px',
            borderRadius: 8, marginBottom: 2, cursor: 'pointer', borderLeft: '3px solid transparent'
          }}>
            <span style={{ color: 'rgba(255,255,255,0.45)', fontSize: 13 }}>{item.icon}</span>
            <span style={{ color: 'rgba(255,255,255,0.45)', fontSize: 12 }}>{item.label}</span>
          </div>
        ))}
      </div>}
    </div>

    {/* WhatsApp + déco */}
    <div style={{ padding: compact ? '8px 0' : '8px 12px', borderTop: '1px solid rgba(255,255,255,0.1)' }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8, padding: compact ? '8px 0' : '8px 10px',
        justifyContent: compact ? 'center' : 'flex-start',
        background: 'rgba(37,211,102,0.12)', borderRadius: 8, marginBottom: 6
      }}>
        <span style={{ fontSize: 14 }}>💬</span>
        {!compact && <span style={{ color: '#4ade80', fontSize: 12, fontWeight: 600 }}>WhatsApp</span>}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: compact ? '8px 0' : '6px 10px', justifyContent: compact ? 'center' : 'flex-start' }}>
        <span style={{ color: 'rgba(255,255,255,0.35)', fontSize: 13 }}>⏻</span>
        {!compact && <span style={{ color: 'rgba(255,255,255,0.35)', fontSize: 12 }}>Déconnexion</span>}
      </div>
    </div>
  </div>
);

// ─── SCREEN 1 : Dashboard ─────────────────────────────────────────
const DashboardScreen = () => (
  <div style={{ display: 'flex', height: 620, width: 960, background: C.bg, borderRadius: 10, overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.10)' }}>
    <Sidebar />
    {/* Main */}
    <div style={{ flex: 1, overflowY: 'auto', padding: 28 }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: C.text }}>Bonjour, Thomas 👋</h1>
          <p style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>Mardi 28 avril 2026</p>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <Box w={34} h={34} radius={17} label="" bg={C.teal} style={{ border: 'none' }}>
            <span style={{ color: '#fff', fontSize: 14, fontWeight: 700 }}>TP</span>
          </Box>
        </div>
      </div>

      {/* Profile completion */}
      <div style={{ background: '#fff', borderRadius: 10, padding: '14px 18px', marginBottom: 18, border: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Complétion du profil</span>
          <span style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>75%</span>
        </div>
        <div style={{ height: 6, background: C.border, borderRadius: 4, overflow: 'hidden' }}>
          <div style={{ width: '75%', height: '100%', background: `linear-gradient(90deg, ${C.teal}, #00d4d4)`, borderRadius: 4 }} />
        </div>
        <p style={{ fontSize: 11, color: C.muted, marginTop: 6 }}>Ajoutez votre photo et votre biographie pour compléter votre profil.</p>
      </div>

      {/* 2-col grid */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {/* Prochains événements */}
        <div style={{ background: '#fff', borderRadius: 10, padding: 16, border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>Prochains événements</span>
            <span style={{ fontSize: 11, color: C.teal, cursor: 'pointer', fontWeight: 600 }}>Voir tout →</span>
          </div>
          {[
            { type: 'Webinaire', title: 'CSRD : comment se préparer ?', date: '12 mai • 12h00', color: C.teal },
            { type: 'Afterwork', title: 'Networking ESG Paris', date: '20 mai • 18h30', color: C.navy },
          ].map((ev, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 0', borderBottom: i === 0 ? `1px solid ${C.border}` : 'none' }}>
              <div style={{ width: 36, height: 36, borderRadius: 8, background: ev.color + '15', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <span style={{ fontSize: 16 }}>{ev.type === 'Webinaire' ? '🎙' : '🤝'}</span>
              </div>
              <div>
                <Badge type={ev.type === 'Webinaire' ? 'teal' : 'navy'}>{ev.type}</Badge>
                <p style={{ fontSize: 12, fontWeight: 600, color: C.text, marginTop: 3 }}>{ev.title}</p>
                <p style={{ fontSize: 11, color: C.muted }}>{ev.date}</p>
              </div>
            </div>
          ))}
        </div>

        {/* Nouveaux membres */}
        <div style={{ background: '#fff', borderRadius: 10, padding: 16, border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>Nouveaux membres</span>
            <span style={{ fontSize: 11, color: C.teal, cursor: 'pointer', fontWeight: 600 }}>Annuaire →</span>
          </div>
          {[
            { initials: 'SL', name: 'Sophie Laurent', role: 'Consultante RSE', sector: 'Finance & Assurance' },
            { initials: 'MK', name: 'Marc Kowalski', role: 'Responsable RSE', sector: 'Industrie' },
            { initials: 'AB', name: 'Aïcha Benali', role: 'Expert-comptable', sector: 'Services aux entreprises' },
          ].map((m, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: i < 2 ? `1px solid ${C.border}` : 'none' }}>
              <div style={{ width: 32, height: 32, borderRadius: 16, background: [C.teal, C.navy, '#7c6ea0'][i], display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <span style={{ color: '#fff', fontSize: 11, fontWeight: 700 }}>{m.initials}</span>
              </div>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{m.name}</p>
                <p style={{ fontSize: 11, color: C.muted }}>{m.role} • {m.sector}</p>
              </div>
              <span style={{ fontSize: 11, color: C.teal, cursor: 'pointer' }}>Voir →</span>
            </div>
          ))}
        </div>
      </div>

      {/* WhatsApp CTA */}
      <div style={{
        marginTop: 16, background: `linear-gradient(135deg, #1a7a3a, #25d366)`,
        borderRadius: 10, padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 24 }}>💬</span>
          <div>
            <p style={{ fontSize: 13, fontWeight: 700, color: '#fff' }}>Groupe WhatsApp communautaire</p>
            <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.8)' }}>Rejoignez les échanges rapides et informels avec les membres</p>
          </div>
        </div>
        <div style={{ background: 'rgba(255,255,255,0.2)', borderRadius: 8, padding: '7px 14px', cursor: 'pointer', border: '1px solid rgba(255,255,255,0.3)' }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: '#fff' }}>Rejoindre →</span>
        </div>
      </div>
    </div>
  </div>
);

// ─── SCREEN 2 : Landing page ──────────────────────────────────────
const LandingScreen = () => (
  <div style={{ width: 960, background: '#fff', borderRadius: 10, overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.10)' }}>
    {/* Nav */}
    <div style={{ background: C.navy, padding: '14px 40px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 32, height: 32, borderRadius: 8, background: C.teal, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ color: '#fff', fontWeight: 700, fontSize: 14 }}>C</span>
        </div>
        <span style={{ color: '#fff', fontWeight: 700, fontSize: 14 }}>Club ESG</span>
      </div>
      <div style={{ display: 'flex', gap: 12 }}>
        <div style={{ padding: '7px 18px', borderRadius: 8, border: `1px solid rgba(255,255,255,0.25)`, cursor: 'pointer' }}>
          <span style={{ color: '#fff', fontSize: 12, fontWeight: 500 }}>Se connecter</span>
        </div>
        <div style={{ padding: '7px 18px', borderRadius: 8, background: C.teal, cursor: 'pointer' }}>
          <span style={{ color: '#fff', fontSize: 12, fontWeight: 600 }}>Rejoindre le Club</span>
        </div>
      </div>
    </div>

    {/* Hero */}
    <div style={{ background: `linear-gradient(135deg, ${C.navy} 0%, #2a4a7f 100%)`, padding: '52px 40px 40px', textAlign: 'center' }}>
      <div style={{ display: 'inline-block', background: 'rgba(0,180,180,0.15)', borderRadius: 20, padding: '4px 16px', marginBottom: 16 }}>
        <span style={{ color: C.teal, fontSize: 12, fontWeight: 600 }}>Communauté privée · 40+ professionnels</span>
      </div>
      <h1 style={{ fontSize: 34, fontWeight: 700, color: '#fff', lineHeight: 1.25, maxWidth: 580, margin: '0 auto 14px' }}>
        La communauté des <span style={{ color: C.teal }}>professionnels ESG</span> engagés
      </h1>
      <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.7)', maxWidth: 460, margin: '0 auto 28px', lineHeight: 1.6 }}>
        Échangez, formez-vous et développez votre réseau avec des experts-comptables, consultants RSE et responsables ESG.
      </p>
      <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
        <div style={{ padding: '11px 28px', borderRadius: 8, background: C.teal, cursor: 'pointer' }}>
          <span style={{ color: '#fff', fontSize: 14, fontWeight: 700 }}>Demander l'accès</span>
        </div>
        <div style={{ padding: '11px 28px', borderRadius: 8, border: '1px solid rgba(255,255,255,0.25)', cursor: 'pointer' }}>
          <span style={{ color: '#fff', fontSize: 14, fontWeight: 500 }}>Découvrir le club</span>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: 'flex', justifyContent: 'center', gap: 40, marginTop: 36, paddingTop: 28, borderTop: '1px solid rgba(255,255,255,0.12)' }}>
        {[['40+', 'Membres'], ['12', 'Webinaires'], ['8', 'Replays'], ['3', 'Events/mois']].map(([n, l]) => (
          <div key={l} style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: C.teal }}>{n}</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.55)', marginTop: 2 }}>{l}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Members preview */}
    <div style={{ padding: '32px 40px', background: C.bg }}>
      <h2 style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 18, textAlign: 'center' }}>Quelques membres de la communauté</h2>
      <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
        {[
          { i: 'SL', name: 'Sophie L.', role: 'Consultante RSE', tags: ['CSRD', 'Stratégie RSE'] },
          { i: 'MK', name: 'Marc K.', role: 'Responsable RSE', tags: ['Bilan carbone'] },
          { i: 'AB', name: 'Aïcha B.', role: 'Expert-comptable', tags: ['Finance durable'] },
          { i: 'RP', name: 'Rémi P.', role: 'Consultant RSE', tags: ['Audit & Certif.'] },
        ].map((m, i) => (
          <div key={i} style={{ background: '#fff', borderRadius: 10, padding: '14px 16px', border: `1px solid ${C.border}`, width: 190, textAlign: 'center' }}>
            <div style={{ width: 44, height: 44, borderRadius: 22, background: [C.teal, C.navy, '#7c6ea0', '#e07040'][i], margin: '0 auto 8px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ color: '#fff', fontWeight: 700, fontSize: 15 }}>{m.i}</span>
            </div>
            <p style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{m.name}</p>
            <p style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>{m.role}</p>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center' }}>
              {m.tags.map(t => <Tag key={t}>{t}</Tag>)}
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* Events preview */}
    <div style={{ padding: '28px 40px', background: '#fff' }}>
      <h2 style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 16, textAlign: 'center' }}>Prochains événements</h2>
      <div style={{ display: 'flex', gap: 12 }}>
        {[
          { type: 'Webinaire', title: 'CSRD : comment se préparer ?', date: '12 mai 2026 • 12h00', icon: '🎙' },
          { type: 'Afterwork', title: 'Networking ESG Paris', date: '20 mai 2026 • 18h30', icon: '🤝' },
          { type: 'Workshop', title: 'Bilan carbone pratique', date: '3 juin 2026 • 14h00', icon: '📋' },
        ].map((ev, i) => (
          <div key={i} style={{ flex: 1, background: C.bg, borderRadius: 10, padding: '14px 16px', border: `1px solid ${C.border}` }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 }}>
              <span style={{ fontSize: 18 }}>{ev.icon}</span>
              <Badge type="teal">{ev.type}</Badge>
            </div>
            <p style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 4 }}>{ev.title}</p>
            <p style={{ fontSize: 11, color: C.muted }}>{ev.date}</p>
          </div>
        ))}
      </div>
    </div>

    {/* CTA footer */}
    <div style={{ padding: '28px 40px', background: C.teal, textAlign: 'center' }}>
      <p style={{ fontSize: 17, fontWeight: 700, color: '#fff', marginBottom: 12 }}>Prêt·e à rejoindre la communauté ?</p>
      <div style={{ display: 'inline-block', padding: '10px 28px', background: '#fff', borderRadius: 8, cursor: 'pointer' }}>
        <span style={{ color: C.teal, fontWeight: 700, fontSize: 14 }}>Demander l'accès gratuit →</span>
      </div>
    </div>
  </div>
);

// ─── SCREEN 3 : Inscription 3 étapes ─────────────────────────────
const InscriptionScreen = ({ step = 1 }) => {
  const steps = ['Infos personnelles', 'Infos professionnelles', 'Charte & validation'];
  return (
    <div style={{ width: 640, background: '#fff', borderRadius: 10, overflow: 'hidden', boxShadow: '0 4px 24px rgba(0,0,0,0.10)' }}>
      {/* Header */}
      <div style={{ background: C.navy, padding: '16px 32px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ width: 28, height: 28, borderRadius: 7, background: C.teal, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ color: '#fff', fontWeight: 700, fontSize: 12 }}>C</span>
        </div>
        <span style={{ color: '#fff', fontWeight: 700, fontSize: 13 }}>Club ESG</span>
      </div>

      <div style={{ padding: '28px 40px' }}>
        <h2 style={{ fontSize: 20, fontWeight: 700, color: C.text, marginBottom: 6 }}>Rejoindre le Club ESG</h2>
        <p style={{ fontSize: 13, color: C.muted, marginBottom: 24 }}>Votre demande sera examinée par notre équipe avant validation.</p>

        {/* Stepper */}
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 28 }}>
          {steps.map((s, i) => (
            <React.Fragment key={s}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 14,
                  background: i + 1 < step ? C.teal : i + 1 === step ? C.navy : C.border,
                  display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  {i + 1 < step
                    ? <span style={{ color: '#fff', fontSize: 13 }}>✓</span>
                    : <span style={{ color: i + 1 === step ? '#fff' : C.muted, fontSize: 12, fontWeight: 700 }}>{i + 1}</span>}
                </div>
                <span style={{ fontSize: 10, color: i + 1 === step ? C.navy : C.muted, fontWeight: i + 1 === step ? 600 : 400, textAlign: 'center', width: 80 }}>{s}</span>
              </div>
              {i < 2 && <div style={{ flex: 1, height: 2, background: i + 1 < step ? C.teal : C.border, margin: '0 4px', marginBottom: 22 }} />}
            </React.Fragment>
          ))}
        </div>

        {/* Step 1 content */}
        {step === 1 && (
          <div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
              {['Prénom *', 'Nom *'].map(label => (
                <div key={label}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: 'block', marginBottom: 5 }}>{label}</label>
                  <div style={{ height: 38, border: `1px solid ${C.border}`, borderRadius: 7, background: C.bg }} />
                </div>
              ))}
            </div>
            {['Email *', 'Mot de passe *', 'Téléphone'].map(label => (
              <div key={label} style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: 'block', marginBottom: 5 }}>{label}</label>
                <div style={{ height: 38, border: `1px solid ${C.border}`, borderRadius: 7, background: C.bg }} />
              </div>
            ))}
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: 'block', marginBottom: 5 }}>Photo de profil</label>
              <div style={{ height: 72, border: `1.5px dashed ${C.border}`, borderRadius: 8, background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                <span style={{ fontSize: 20 }}>📷</span>
                <span style={{ fontSize: 12, color: C.muted }}>Glisser-déposer ou cliquer · JPEG/PNG · max 5Mo</span>
              </div>
            </div>
          </div>
        )}

        {/* Step 2 content */}
        {step === 2 && (
          <div>
            {[
              { label: 'Type de membre *', type: 'select' },
              { label: 'Fonction / Poste *', type: 'text' },
              { label: 'Entreprise *', type: 'text' },
            ].map(f => (
              <div key={f.label} style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: 'block', marginBottom: 5 }}>{f.label}</label>
                <div style={{ height: 38, border: `1px solid ${C.border}`, borderRadius: 7, background: C.bg, display: 'flex', alignItems: 'center', paddingRight: 10, justifyContent: f.type === 'select' ? 'flex-end' : 'flex-start' }}>
                  {f.type === 'select' && <span style={{ color: C.muted, fontSize: 12 }}>▾</span>}
                </div>
              </div>
            ))}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
              {['Secteur d\'activité *', 'Taille d\'entreprise *'].map(label => (
                <div key={label}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: 'block', marginBottom: 5 }}>{label}</label>
                  <div style={{ height: 38, border: `1px solid ${C.border}`, borderRadius: 7, background: C.bg, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', paddingRight: 10 }}>
                    <span style={{ color: C.muted, fontSize: 12 }}>▾</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: 'block', marginBottom: 5 }}>Expertises * <span style={{ color: C.muted, fontWeight: 400 }}>(multi-sélection)</span></label>
              <div style={{ border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, background: C.bg, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {['Bilan carbone', 'CSRD', 'Stratégie RSE', 'Audit & Certif.', 'Finance durable'].map((t, i) => (
                  <div key={t} style={{ padding: '4px 10px', borderRadius: 20, border: `1px solid ${i < 2 ? C.teal : C.border}`, background: i < 2 ? C.tealLight : '#fff', cursor: 'pointer' }}>
                    <span style={{ fontSize: 11, color: i < 2 ? C.teal : C.text, fontWeight: i < 2 ? 600 : 400 }}>{t}</span>
                  </div>
                ))}
                <span style={{ fontSize: 11, color: C.muted, alignSelf: 'center' }}>+ 10 autres...</span>
              </div>
            </div>
          </div>
        )}

        {/* Step 3 content */}
        {step === 3 && (
          <div>
            <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', marginBottom: 16 }}>
              <div style={{ background: C.navy, padding: '10px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ color: '#fff', fontSize: 13, fontWeight: 600 }}>📄 Charte d'engagement Club ESG</span>
                <span style={{ color: C.teal, fontSize: 11, cursor: 'pointer' }}>Télécharger PDF ↓</span>
              </div>
              <div style={{ height: 140, background: '#f8f9fa', padding: 16, overflowY: 'auto' }}>
                <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>La présente charte définit les engagements des membres du Club ESG vis-à-vis de la communauté…</p>
                <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6, marginTop: 8 }}>• Respect des autres membres et de la confidentialité des échanges</p>
                <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>• Contribution active à la vie de la communauté</p>
                <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>• Partage d'informations de bonne foi et dans un esprit constructif</p>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', marginBottom: 16 }}>
              <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${C.teal}`, background: C.teal, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>
                <span style={{ color: '#fff', fontSize: 12 }}>✓</span>
              </div>
              <p style={{ fontSize: 12, color: C.text, lineHeight: 1.5 }}>J'ai lu et j'accepte la charte d'engagement du Club ESG et m'engage à respecter ses valeurs.</p>
            </div>
            <div style={{ background: C.bg, borderRadius: 8, padding: 14, border: `1px solid ${C.border}`, marginBottom: 4 }}>
              <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>⏳ Votre demande sera examinée par notre équipe. Vous recevrez un email de confirmation sous 48h.</p>
            </div>
          </div>
        )}

        {/* Actions */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 20 }}>
          {step > 1
            ? <div style={{ padding: '9px 20px', border: `1px solid ${C.border}`, borderRadius: 8, cursor: 'pointer' }}>
                <span style={{ fontSize: 13, color: C.muted, fontWeight: 500 }}>← Retour</span>
              </div>
            : <span style={{ fontSize: 12, color: C.muted }}>Déjà membre ? <span style={{ color: C.teal, cursor: 'pointer' }}>Se connecter</span></span>}
          <div style={{ padding: '9px 24px', background: C.teal, borderRadius: 8, cursor: 'pointer' }}>
            <span style={{ fontSize: 13, color: '#fff', fontWeight: 700 }}>
              {step === 3 ? 'Envoyer ma demande ✓' : 'Continuer →'}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
};

          { i: 'MK', name: 'Marc Kowalski', fn: 'Consultant senior', co: 'EY', sector: 'Finance & Assurance', city: 'Lyon', type: 'Consultant RSE', tags: ['Bilan carbone', 'Audit & Certif.'] },

            <div style={{ width: 46, height: 46, borderRadius: 23, background: [C.teal, C.navy, '#7c6ea0', '#e07040'][i], display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
